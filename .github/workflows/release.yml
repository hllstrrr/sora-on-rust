name: Release Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - build_type: stable
            cargo_flags: "--features stable"
          - build_type: performance
            cargo_flags: "--no-default-features --features performance"
          - build_type: profiling
            cargo_flags: "--no-default-features --features profiling"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Build Release
        run: cargo build --release ${{ matrix.cargo_flags }}

      - name: Prepare Binary Name
        run: |
          mv target/release/sora-on-rust sora-on-rust-${{ matrix.build_type }}

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: sora-on-rust-${{ matrix.build_type }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}